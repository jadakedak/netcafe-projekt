<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="header">
        <h1>Admin Panel</h1>
        <a href="/{{ userid }}/home">Home</a>
        <a href="/{{ userid }}/menu">Menu</a>
    </div>

    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-section">
                <span class="sidebar-label">Manage</span>
                <button class="sidebar-item active" data-page="user_administration">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Users
                </button>
                <button class="sidebar-item" data-page="computer_administration">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                    Computers
                </button>
                <button class="sidebar-item" data-page="Menu Administration">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
                    Food Menu
                </button>
            </div>
        </nav>

        <main class="content">
            <div id="user_administration" class="page active">
                <h2>Administer Users</h2>
                <div id="admin_user_list"></div>
                <h2>User Administration</h2>
                <div id="user_list"></div>
            </div>

            <div id="computer_administration" class="page">
                <h2>Computer Administration</h2>
                <button id="get-computers-test">get comp</button>
                <div id="computer_list"></div>
            </div>

            <div id="Menu Administration" class="page">
                <div class="page-header">
                    <h2>Menu Administration</h2>
                    <button id="add-menu-item">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add Item
                    </button>
                </div>
                <div id="menu_list"></div>
            </div>
        </main>
    </div>

    <div id="menu_item_form" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Add Menu Item</h2>
                <button id="close-form-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="add-menu-item-form">
                <div class="form-field">
                    <label>Name</label>
                    <input type="text" id="menu-item-name" placeholder="e.g. Cheeseburger" required>
                </div>
                <div class="form-field">
                    <label>Description</label>
                    <textarea id="menu-item-description" placeholder="Short description..." required></textarea>
                </div>
                <div class="form-field">
                    <label>Image URL</label>
                    <input type="text" id="menu-item-picture" placeholder="https://...">
                </div>
                <div class="form-field">
                    <label>Price (kr)</label>
                    <input type="number" id="menu-item-price" placeholder="0.00" step="0.01" required>
                </div>
                <button type="submit" id="submit-menu-item">Add Item</button>
            </form>
        </div>
    </div> 

    <div id="edit_menu_item_form" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Edit Menu Item</h2>
                <button id="close-edit-form-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="edit-menu-item-form">
                <div class="form-field">
                    <label>id</label>
                    <input type="text" id="edit-item-id" readonly>
                </div>
                <div class="form-field">
                    <label>Name</label>
                    <input type="text" id="edit-item-name" placeholder="e.g. Cheeseburger" required>
                </div>
                <div class="form-field">
                    <label>Description</label>
                    <textarea id="edit-item-description" placeholder="Short description..." required></textarea>
                </div>
                <div class="form-field">
                    <label>Image URL</label>
                    <input type="text" id="edit-item-picture" placeholder="https://...">
                </div>
                <div class="form-field">
                    <label>Price (kr)</label>
                    <input type="number" id="edit-item-price" placeholder="0.00" step="0.01" required>
                </div>
                <button type="submit" id="submit-edit-menu-item">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
    <script>
        document.querySelectorAll('.sidebar-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.page).classList.add('active');
            });
        });
    </script>
</body>
</html>
